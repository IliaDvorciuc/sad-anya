<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Для Ани</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="scene">
      <div class="sky" id="sky"></div>

      <img class="kitty kitty-1" src="./images/clipart227928.png" alt="" />
      <img class="kitty kitty-2" src="./images/clipart24320.png" alt="" />
      <img class="kitty kitty-3" src="./images/clipart22873.png" alt="" />

      <section class="message">
        <p class="small">Аня, это тебе</p>

        <div class="text3d" aria-label="НЕ ГРУСТИ, АНЯ">
          <span>Н</span>
          <span>Е</span>
          <span>&nbsp;</span>
          <span>Г</span>
          <span>Р</span>
          <span>У</span>
          <span>С</span>
          <span>Т</span>
          <span>И</span>
          <span>,</span>
          <span>&nbsp;</span>
          <span>А</span>
          <span>Н</span>
          <span>Я</span>
        </div>

        <p class="subtitle">Ты классная. Всё будет хорошо! ✨</p>

        <button id="magicButton" class="magic-button" type="button">
          нажми для радости
        </button>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
